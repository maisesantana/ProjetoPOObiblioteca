services:

  db:
    image: mysql:8.0
    container_name: atlas-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: atlas
    ports:
      - "3306:3306"
    volumes:
      - ./sql/atlas.sql:/docker-entrypoint-initdb.d/atlas.sql
    command: --lower_case_table_names=1
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: atlas-app
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: atlas
      DB_USER: root
      DB_PASS: root